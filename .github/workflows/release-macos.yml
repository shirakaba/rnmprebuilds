name: Release macOS Prebuild

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    # https://github.com/actions/runner-images
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-26-arm64-Readme.md
    runs-on: macos-26
    env:
      RELEASE_TAG: v0.79.2

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Resolve release version
        id: version
        run: |
          if [ "$RELEASE_TAG" = "auto" ]; then
            TAG="v$(node -p 'require("./package.json").dependencies["react-native-macos"]')"
          else
            TAG="$RELEASE_TAG"
          fi

          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Expected RELEASE_TAG to resolve to a plain vX.Y.Z tag, got $TAG" >&2
              exit 1
              ;;
          esac

          ASSET_PATH="build-cache-provider/releases/electron-$TAG-darwin-arm64.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset_path=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install CocoaPods
        working-directory: macos
        run: bundle exec pod install

      - name: Build and publish release
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
        run: node ./build-cache-provider/scripts/demo.js --config Debug --cache --publish --tag "$RELEASE_TAG"

      - name: Write release summary
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          {
            echo "## Release"
            echo
            echo "- Tag: [\`${RELEASE_TAG}\`](${RELEASE_URL})"
            echo "- Release: [Open release](${RELEASE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.version.outputs.asset_path }}
